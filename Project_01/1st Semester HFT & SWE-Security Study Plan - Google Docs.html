
<h2 class="sr-only">Snake Water Gun game — choose your move and play against the computer</h2>

<style>
  .game-wrap { padding: 1.5rem 0; max-width: 560px; margin: 0 auto; }
  .score-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 1.5rem; }
  .score-card { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 0.75rem 1rem; text-align: center; }
  .score-label { font-size: 12px; color: var(--text-muted); letter-spacing: 0.04em; margin-bottom: 4px; }
  .score-num { font-size: 28px; font-weight: 500; color: var(--text-primary); line-height: 1; }
  .score-draw { text-align: center; }
  .score-draw .score-label { margin-bottom: 4px; }
  .score-draw .score-num { font-size: 20px; color: var(--text-secondary); }

  .battle-area { background: var(--surface-1); border: 0.5px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.25rem; min-height: 120px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; }
  .battle-icons { display: flex; align-items: center; gap: 24px; font-size: 52px; line-height: 1; }
  .battle-vs { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .result-text { font-size: 16px; font-weight: 500; margin-top: 4px; }
  .result-win { color: var(--text-success); }
  .result-lose { color: var(--text-danger); }
  .result-draw { color: var(--text-secondary); }
  .idle-text { font-size: 15px; color: var(--text-muted); }

  .choice-row { display: flex; gap: 12px; margin-bottom: 1rem; }
  .choice-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 1rem 0.5rem; background: var(--surface-2); border: 0.5px solid var(--border-strong); border-radius: 12px; cursor: pointer; transition: background 0.15s, border-color 0.15s, transform 0.1s; font-size: 36px; line-height: 1; }
  .choice-btn:hover { background: var(--bg-accent); border-color: var(--border-accent); transform: translateY(-2px); }
  .choice-btn:active { transform: scale(0.97); }
  .choice-btn span { font-size: 12px; font-weight: 500; color: var(--text-secondary); letter-spacing: 0.04em; }

  .history-section { margin-top: 1rem; }
  .history-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .history-dots { display: flex; gap: 6px; flex-wrap: wrap; }
  .h-dot { width: 10px; height: 10px; border-radius: 50%; }
  .h-win { background: var(--fill-success); }
  .h-lose { background: var(--fill-danger); }
  .h-draw { background: var(--border-stronger); }

  .reset-btn { background: none; border: 0.5px solid var(--border); border-radius: var(--radius); padding: 6px 14px; font-size: 13px; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; gap: 6px; margin-top: 1rem; }
  .reset-btn:hover { background: var(--surface-1); color: var(--text-primary); }
</style>

<div class="game-wrap">
  <div class="score-row">
    <div class="score-card">
      <div class="score-label">You</div>
      <div class="score-num" id="score-you">0</div>
    </div>
    <div class="score-draw">
      <div class="score-label">Draw</div>
      <div class="score-num" id="score-draw">0</div>
    </div>
    <div class="score-card">
      <div class="score-label">Computer</div>
      <div class="score-num" id="score-cpu">0</div>
    </div>
  </div>

  <div class="battle-area" id="battle-area">
    <div class="idle-text">Apna choice choose karo!</div>
  </div>

  <div class="choice-row">
    <button class="choice-btn" onclick="play(1)" aria-label="Snake">
      🐍<span>Snake</span>
    </button>
    <button class="choice-btn" onclick="play(-1)" aria-label="Water">
      💧<span>Water</span>
    </button>
    <button class="choice-btn" onclick="play(0)" aria-label="Gun">
      🔫<span>Gun</span>
    </button>
  </div>

  <div class="history-section">
    <div class="history-label">Round history</div>
    <div class="history-dots" id="history-dots"></div>
  </div>

  <button class="reset-btn" onclick="resetGame()">
    <i class="ti ti-refresh" aria-hidden="true"></i> Reset
  </button>
</div>

<script>
const EMO = { 1: '🐍', '-1': '💧', 0: '🔫' };
const NAME = { 1: 'Snake', '-1': 'Water', 0: 'Gun' };
let scores = { you: 0, cpu: 0, draw: 0 };
let history = [];

function getResult(you, cpu) {
  if (you === cpu) return 'draw';
  if ((cpu === -1 && you === 0) || (cpu === 1 && you === -1) || (cpu === 0 && you === 1)) return 'lose';
  return 'win';
}

function play(you) {
  const cpu = [-1, 0, 1][Math.floor(Math.random() * 3)];
  const result = getResult(you, cpu);

  if (result === 'win') scores.you++;
  else if (result === 'lose') scores.cpu++;
  else scores.draw++;

  history.push(result);
  render(you, cpu, result);
}

function render(you, cpu, result) {
  document.getElementById('score-you').textContent = scores.you;
  document.getElementById('score-cpu').textContent = scores.cpu;
  document.getElementById('score-draw').textContent = scores.draw;

  const msgs = {
    win: { text: 'Tum jeet gaye! 🎉', cls: 'result-win' },
    lose: { text: 'Computer jeeta! 😬', cls: 'result-lose' },
    draw: { text: "Barabar! It's a draw 🤝", cls: 'result-draw' }
  };
  const m = msgs[result];

  document.getElementById('battle-area').innerHTML = `
    <div class="battle-icons">${EMO[you]} <span style="font-size:18px;color:var(--text-muted)">vs</span> ${EMO[cpu]}</div>
    <div class="battle-vs">${NAME[you]} vs ${NAME[cpu]}</div>
    <div class="result-text ${m.cls}">${m.text}</div>
  `;

  const dots = document.getElementById('history-dots');
  const dot = document.createElement('div');
  dot.className = `h-dot h-${result}`;
  dot.title = result;
  dots.appendChild(dot);
}

function resetGame() {
  scores = { you: 0, cpu: 0, draw: 0 };
  history = [];
  document.getElementById('score-you').textContent = '0';
  document.getElementById('score-cpu').textContent = '0';
  document.getElementById('score-draw').textContent = '0';
  document.getElementById('history-dots').innerHTML = '';
  document.getElementById('battle-area').innerHTML = '<div class="idle-text">Apna choice choose karo!</div>';
}
</script>
